name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Lint · Typecheck · Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate Prisma client (types needed for typecheck)
        run: npx prisma generate
      # Non-blocking for now: surfaces pre-existing lint debt without failing CI
      # (the broken `next lint` had hidden it). Flip to blocking once cleaned up.
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Typecheck
        run: npm run typecheck
      - name: Unit + integration tests (mocked, no DB)
        run: npm run test:cov

  e2e:
    name: E2E · overflow · a11y
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: privada_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/privada_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/privada_test?schema=public
      AUTH_SECRET: test-secret-not-for-production
      NEXTAUTH_URL: http://localhost:3000
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Prisma generate · migrate · seed
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Run E2E (visual baselines auto-skip in CI)
        run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
